name: Update Repository Statistics

on:
  push:
    branches:
      - main
      - fix/US-01-actions-test
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

concurrency:
  group: update-repo-stats
  cancel-in-progress: true

jobs:
  update-stats:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    permissions:
      contents: write
      pull-requests: read

    env:
      GH_TOKEN: ${{ github.token }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt || true

      - name: Generate repository stats
        run: |
          python scripts/generate_repo_stats.py

      - name: Update README
        run: |
          python scripts/update_readme_stats.py

      - name: Commit updated stats
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add REPO_STATS.md README.md

          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "docs: update repository statistics"
          git push